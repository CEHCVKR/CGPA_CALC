<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CGPA Calculator (Fixed Credits)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --navy: #0b1f33;
            --blue: #0a6cff;
            --teal: #1eb8c6;
            --card: rgba(255, 255, 255, 0.95);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.35), transparent 28%),
                linear-gradient(135deg, #dff7ff 0%, #eef2ff 45%, #d9f4ef 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 18px 40px rgba(11, 31, 51, 0.14);
            max-width: 620px;
            width: 100%;
            border: 1px solid rgba(10, 108, 255, 0.08);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .logo {
            width: 66px;
            height: 66px;
            border-radius: 18px;
            background: linear-gradient(145deg, var(--navy), var(--blue));
            color: white;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: 0.08em;
            box-shadow: 0 10px 24px rgba(10, 108, 255, 0.28);
            flex: 0 0 auto;
        }
        .brand-text h1 {
            margin: 0;
            color: var(--navy);
            font-size: 1.4rem;
            text-align: left;
        }
        .brand-text p {
            margin: 4px 0 0;
            color: #41566f;
            font-size: 0.98rem;
        }
        h1 {
            text-align: center;
            color: var(--navy);
        }
        label {
            font-weight: bold;
            color: #203449;
        }
        input, button, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            background: linear-gradient(135deg, var(--blue), var(--teal));
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
            border: none;
        }
        button:hover {
            filter: brightness(0.96);
        }
        #inputs {
            margin-top: 20px;
        }
        #result {
            text-align: center;
            font-size: 1.5em;
            color: #0a8f5b;
            margin-top: 20px;
            font-weight: 700;
        }
        .credit-note {
            color: #5b6c80;
            font-size: 0.95rem;
            margin: -8px 0 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">
            <div class="logo">VVIT</div>
            <div class="brand-text">
                <h1>Vasireddy Venkatadri Institute of Technology</h1>
                <p>(Autonomous)</p>
            </div>
        </div>

        <h1>🎯 CGPA Calculator</h1>
        <p class="credit-note">Fixed credits include the 4-2 semester with credits only.</p>

        <label for="semesters">Select number of completed semesters:</label>
        <select id="semesters" onchange="collectData()">
            <option value="">--Select--</option>
            <option value="1">1 Semester</option>
            <option value="2">2 Semesters</option>
            <option value="3">3 Semesters</option>
            <option value="4">4 Semesters</option>
            <option value="5">5 Semesters</option>
            <option value="6">6 Semesters</option>
            <option value="7">7 Semesters</option>
            <option value="8">8 Semesters</option>
        </select>

        <form id="inputs"></form>

        <button onclick="calculateCGPA()">🚀 Calculate CGPA</button>

        <div id="result"></div>
    </div>

    <script>
        const credits = {
            1: 19.5,
            2: 19.5,
            3: 21.5,
            4: 21.5,
            5: 21.5,
            6: 21.5,
            7: 23,
            8: 12
        };

        function collectData() {
            var sems = document.getElementById('semesters').value;
            var container = document.getElementById('inputs');
            container.innerHTML = '';
            for (let i = 1; i <= sems; i++) {
                container.innerHTML += `
                    <h3>Semester ${i} (Credits: ${credits[i]})</h3>
                    <input type="number" id="sgpa_${i}" placeholder="Enter SGPA" step="0.01" required min="0" max="10">
                `;
            }
        }

        function calculateCGPA() {
            var sems = document.getElementById('semesters').value;
            let total_weighted = 0;
            let total_credits = 0;

            for (let i = 1; i <= sems; i++) {
                let sgpa = parseFloat(document.getElementById(`sgpa_${i}`).value);
                if (isNaN(sgpa) || sgpa < 0 || sgpa > 10) {
                    alert(`Please enter a valid SGPA (0–10) for Semester ${i}`);
                    return;
                }

                total_weighted += sgpa * credits[i];
                total_credits += credits[i];
            }

            if (total_credits === 0) {
                document.getElementById('result').innerText = "Total credits cannot be zero.";
                return;
            }

            let cgpa = total_weighted / total_credits;
            document.getElementById('result').innerText = `🎯 Your CGPA is: ${cgpa.toFixed(2)}`;
        }
    </script>

</body>
</html>
